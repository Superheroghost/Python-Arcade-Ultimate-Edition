<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Breakout: Neon Overdrive</title>
  <meta name="description" content="A polished, standalone HTML5 arcade with a modern Breakout core, powerups, effects, and responsive controls.">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <div>
        <h1>Breakout: Neon Overdrive</h1>
        <p class="subtitle">Modern brick breaking with particle chaos, powerups, and a bonus Pong duel.</p>
      </div>
      <button id="muteBtn" class="ghost-btn" type="button" aria-pressed="false">🔊 Sound</button>
    </header>

    <section class="meta-controls" aria-label="Game setup">
      <label>
        Mode
        <select id="modeSelect">
          <option value="breakout" selected>Breakout</option>
          <option value="pong">Pong Duel</option>
        </select>
      </label>
      <label>
        Difficulty
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
    </section>

    <section class="hud" aria-label="Game status">
      <div class="chip"><span>Score</span><strong id="scoreValue">0</strong></div>
      <div class="chip"><span>Lives</span><strong id="livesValue">3</strong></div>
      <div class="chip"><span>Level</span><strong id="levelValue">1</strong></div>
      <div class="chip"><span>High</span><strong id="highValue">0</strong></div>
      <div class="chip wide"><span>Status</span><strong id="powerValue">Ready</strong></div>
    </section>

    <main class="game-shell">
      <canvas id="gameCanvas" width="960" height="540" aria-label="Arcade game canvas"></canvas>
      <div id="overlay" class="overlay visible" role="status" aria-live="polite">
        <h2 id="overlayTitle">Neon Overdrive</h2>
        <p id="overlayText">Move with A/D or ←/→, then press Space to launch.</p>
        <button id="startBtn" class="primary-btn" type="button">Start Game</button>
      </div>
    </main>

    <section class="controls">
      <button id="restartBtn" class="ghost-btn" type="button">Restart</button>
      <button id="pauseBtn" class="ghost-btn" type="button">Pause</button>
    </section>

    <section class="touch-controls" aria-label="Touch controls">
      <button id="touchLeft" type="button">◀</button>
      <button id="touchLaunch" type="button">Launch</button>
      <button id="touchRight" type="button">▶</button>
    </section>
  </div>

  <script src="./main.js"></script>
</body>
</html>
